name: proyecto_deviceguard
services:
  db:
    image: mysql:8.0
    container_name: proyecto_db
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      MYSQL_ROOT_PASSWORD: 
      MYSQL_DATABASE: 
      MYSQL_USER: 
      MYSQL_PASSWORD: 
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ../backend
      dockerfile: ../Docker/backend.Dockerfile
    container_name: proyecto_backend
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      DB_HOST: db
    ports:
      - "6500:5000"
    networks:
      - app_network
    depends_on:
      db:
        condition: service_healthy
  frontend:
    build:
      context: ../frontend
      dockerfile: ../Docker/frontend.Dockerfile
    container_name: proyecto_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://backend:5000
    ports:
      - "5173:5173"
    networks:
      - app_network
    depends_on:
      - backend
networks:
  app_network:
    driver: bridge
volumes:
  mysql_data:
    driver: local
